<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Operations Dashboard</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM (UMD) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel Standalone (for in-browser JSX) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* Custom Scrollbar for compact table */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    
    /* Sticky Column drop shadow fix */
    .sticky-shadow { box-shadow: 4px 0 6px -1px rgba(0, 0, 0, 0.1); }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans p-2 md:p-4 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback } = React;

    // --- CONFIGURATION ---
    const SHEET_ID = '1mtORjZ4a5EyrlPJsiejhXuMZiyw5MStoXdxn5l1Jhno';
    const GID = '447092227';
    // Using the export endpoint for raw CSV
    const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;

    // --- ICONS (Inline SVG) ---
    const Icons = {
      RefreshCw: ({ className }) => <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>,
      Download: ({ className }) => <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>,
      Search: ({ className }) => <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>,
    };

    // --- UTILITIES ---
    // Handles commas inside quotes
    const parseCSV = (text) => {
      const rows = [];
      let row = [];
      let currentString = '';
      let insideQuotes = false;
      
      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        if (char === '"') {
          if (insideQuotes && text[i+1] === '"') { currentString += '"'; i++; } 
          else { insideQuotes = !insideQuotes; }
        } else if (char === ',' && !insideQuotes) {
          row.push(currentString.trim());
          currentString = '';
        } else if (char === '\n' && !insideQuotes) {
          row.push(currentString.trim());
          rows.push(row);
          row = [];
          currentString = '';
        } else if (char !== '\r') {
          currentString += char;
        }
      }
      if (currentString !== '' || row.length > 0) {
        row.push(currentString.trim());
        rows.push(row);
      }
      return rows;
    };

    const parseNumber = (val) => {
      if (!val) return 0;
      const cleanStr = String(val).replace(/[,$\s%]/g, '');
      const num = parseFloat(cleanStr);
      return isNaN(num) ? 0 : num;
    };

    const formatShort = (num, isCurrency = false) => {
      if (num >= 1000000) return (isCurrency ? '$' : '') + (num / 1000000).toFixed(1) + 'M';
      if (num >= 1000) return (isCurrency ? '$' : '') + (num / 1000).toFixed(1) + 'K';
      return (isCurrency ? '$' : '') + num.toLocaleString(undefined, { maximumFractionDigits: 1 });
    };

    const getDynamicIndex = (headers, keywords) => {
      for (let i = 0; i < headers.length; i++) {
        const header = headers[i].toLowerCase();
        if (keywords.some(kw => header.includes(kw.toLowerCase()))) return i;
      }
      return -1;
    };

    // --- MAIN APP COMPONENT ---
    const App = () => {
      const [data, setData] = useState([]);
      const [headers, setHeaders] = useState([]);
      const [grandTotal, setGrandTotal] = useState(null);
      const [loading, setLoading] = useState(true);
      const [lastSynced, setLastSynced] = useState('');
      const [error, setError] = useState('');

      // State: Filters
      const [filters, setFilters] = useState({ brand: '', center: '', therapist: '', search: '' });

      // State: Sort
      const [sortConfig, setSortConfig] = useState({ key: null, direction: 'desc' });

      // Dynamic Column Indexes
      const [colIndices, setColIndices] = useState({});

      const fetchData = useCallback(async () => {
        setLoading(true);
        setError('');
        try {
          const res = await fetch(CSV_URL);
          if (!res.ok) throw new Error("Failed to fetch Google Sheet data. Make sure the sheet is published or publicly viewable.");
          const text = await res.text();
          const rows = parseCSV(text);

          if (rows.length === 0) throw new Error("No data found in the spreadsheet.");

          // 1. Identify Header Row (assuming it contains "Brand" or "Center")
          let headerIdx = 0;
          for (let i = 0; i < Math.min(10, rows.length); i++) {
            const rowStr = (rows[i] || []).join(' ').toLowerCase();
            if (rowStr.includes('brand') || rowStr.includes('center') || rowStr.includes('name')) {
              headerIdx = i; break;
            }
          }

          const rawHeaders = rows[headerIdx] || [];
          setHeaders(rawHeaders);

          // Dynamic mapping based on likely names from your blueprint
          const indices = {
            brand: getDynamicIndex(rawHeaders, ['brand']),
            center: getDynamicIndex(rawHeaders, ['center', 'floor']),
            therapist: getDynamicIndex(rawHeaders, ['therapist', 'staff']),
            nodes: getDynamicIndex(rawHeaders, ['node', '分發點']),
            book: getDynamicIndex(rawHeaders, ['book', 'icb']),
            ptQty: getDynamicIndex(rawHeaders, ['pt qty', 'pexo', 'qty']),
            revenue: getDynamicIndex(rawHeaders, ['rev', 'sales']),
            mtd: getDynamicIndex(rawHeaders, ['mtd', '紫燈'])
          };
          
          // Fallback if critical columns aren't found (using indices 0, 1, 2)
          if (indices.brand === -1) indices.brand = 0;
          if (indices.center === -1) indices.center = 1;
          if (indices.therapist === -1) indices.therapist = 2;
          
          setColIndices(indices);

          let processedData = [];
          let currentBrand = '';
          let currentCenter = '';
          let extractedTotal = null;

          // 2. Data Cleaning & Fill-Down Logic
          for (let i = headerIdx + 1; i < rows.length; i++) {
            const row = rows[i];
            if (!row || row.length === 0 || row.every(c => !c)) continue;

            const brandVal = row[indices.brand] || currentBrand;
            const centerVal = row[indices.center] || currentCenter;
            const therapistVal = row[indices.therapist] || '';

            // Identify Grand Total
            if (String(centerVal).toLowerCase().includes('grand total') || String(brandVal).toLowerCase().includes('grand total')) {
              extractedTotal = row;
              continue;
            }

            // Fill down
            if (row[indices.brand]) currentBrand = row[indices.brand];
            if (row[indices.center]) currentCenter = row[indices.center];

            row[indices.brand] = brandVal;
            row[indices.center] = centerVal;

            processedData.push(row);
          }

          setData(processedData);
          setGrandTotal(extractedTotal);
          setLastSynced(new Date().toLocaleTimeString());
        } catch (err) {
          setError(err.message);
        }
        setLoading(false);
      }, []);

      useEffect(() => { fetchData(); }, [fetchData]);

      // Filtering Logic
      const filteredData = useMemo(() => {
        return data.filter(row => {
          const matchBrand = !filters.brand || row[colIndices.brand] === filters.brand;
          const matchCenter = !filters.center || row[colIndices.center] === filters.center;
          const matchTherapist = !filters.therapist || row[colIndices.therapist] === filters.therapist;
          const matchSearch = !filters.search || row.some(cell => String(cell).toLowerCase().includes(filters.search.toLowerCase()));
          return matchBrand && matchCenter && matchTherapist && matchSearch;
        });
      }, [data, filters, colIndices]);

      // Sorting Logic
      const sortedData = useMemo(() => {
        if (sortConfig.key === null) return filteredData;
        const sorted = [...filteredData].sort((a, b) => {
          let valA = a[sortConfig.key];
          let valB = b[sortConfig.key];
          
          // Try to sort numerically if possible
          const numA = parseNumber(valA);
          const numB = parseNumber(valB);
          
          if (!isNaN(numA) && !isNaN(numB) && valA !== '' && valB !== '') {
            return sortConfig.direction === 'asc' ? numA - numB : numB - numA;
          }
          return sortConfig.direction === 'asc' 
            ? String(valA || '').localeCompare(String(valB || '')) 
            : String(valB || '').localeCompare(String(valA || ''));
        });
        return sorted;
      }, [filteredData, sortConfig]);

      // Dynamic Options for Cascading Dropdowns
      const brandOptions = [...new Set(data.map(r => r[colIndices.brand]).filter(Boolean))];
      const centerOptions = [...new Set(data.filter(r => !filters.brand || r[colIndices.brand] === filters.brand).map(r => r[colIndices.center]).filter(Boolean))];
      const therapistOptions = [...new Set(data.filter(r => (!filters.brand || r[colIndices.brand] === filters.brand) && (!filters.center || r[colIndices.center] === filters.center)).map(r => r[colIndices.therapist]).filter(Boolean))];

      // Summary Logic
      const summary = useMemo(() => {
        const isFiltered = filters.brand || filters.center || filters.therapist || filters.search;
        
        if (!isFiltered && grandTotal) {
           return {
             nodes: colIndices.nodes !== -1 ? parseNumber(grandTotal[colIndices.nodes]) : 0,
             book: colIndices.book !== -1 ? parseNumber(grandTotal[colIndices.book]) : 0,
             ptQty: colIndices.ptQty !== -1 ? parseNumber(grandTotal[colIndices.ptQty]) : 0,
             rev: colIndices.revenue !== -1 ? parseNumber(grandTotal[colIndices.revenue]) : 0
           }
        }

        // Sum up filtered rows dynamically
        return filteredData.reduce((acc, row) => {
          if (colIndices.nodes !== -1) acc.nodes += parseNumber(row[colIndices.nodes]);
          if (colIndices.book !== -1) acc.book += parseNumber(row[colIndices.book]);
          if (colIndices.ptQty !== -1) acc.ptQty += parseNumber(row[colIndices.ptQty]);
          if (colIndices.revenue !== -1) acc.rev += parseNumber(row[colIndices.revenue]);
          return acc;
        }, { nodes: 0, book: 0, ptQty: 0, rev: 0 });

      }, [filteredData, grandTotal, filters, colIndices]);

      // Export CSV
      const handleExport = () => {
        const csvContent = "data:text/csv;charset=utf-8,\uFEFF" 
          + [headers.join(","), ...sortedData.map(e => e.map(cell => `"${String(cell || '').replace(/"/g, '""')}"`).join(","))].join("\n");
        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `dashboard_export_${new Date().getTime()}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      const handleSort = (index) => {
        let direction = 'desc';
        if (sortConfig.key === index && sortConfig.direction === 'desc') direction = 'asc';
        setSortConfig({ key: index, direction });
      };

      return (
        <div className="flex flex-col gap-4 max-w-[1600px] mx-auto font-sans">
          {/* Header Section */}
          <div className="flex flex-col md:flex-row justify-between items-start md:items-center bg-white p-4 rounded-lg shadow-sm border border-gray-100">
            <div>
              <h1 className="text-2xl font-black bg-gradient-to-r from-blue-700 to-purple-600 bg-clip-text text-transparent uppercase tracking-tight">
                Operations Dashboard
              </h1>
              <p className="text-xs text-gray-500 mt-1 flex items-center gap-2">
                Last Synced: {lastSynced || '--:--'}
                <button onClick={fetchData} className="text-blue-500 hover:text-blue-700 p-1 rounded hover:bg-blue-50 transition-colors" title="Resync Data">
                  <Icons.RefreshCw className={`w-3 h-3 ${loading ? 'animate-spin' : ''}`} />
                </button>
              </p>
            </div>

            {/* Global Filters */}
            <div className="flex flex-wrap items-center gap-2 mt-4 md:mt-0 w-full md:w-auto">
              <select className="border border-gray-300 rounded px-2 py-1.5 text-xs bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none" 
                value={filters.brand} onChange={e => setFilters({...filters, brand: e.target.value, center: '', therapist: ''})}>
                <option value="">All Brands</option>
                {brandOptions.map(b => <option key={b} value={b}>{b}</option>)}
              </select>
              <select className="border border-gray-300 rounded px-2 py-1.5 text-xs bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none" 
                value={filters.center} onChange={e => setFilters({...filters, center: e.target.value, therapist: ''})}>
                <option value="">All Centers</option>
                {centerOptions.map(c => <option key={c} value={c}>{c}</option>)}
              </select>
              <select className="border border-gray-300 rounded px-2 py-1.5 text-xs bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none" 
                value={filters.therapist} onChange={e => setFilters({...filters, therapist: e.target.value})}>
                <option value="">All Therapists</option>
                {therapistOptions.map(t => <option key={t} value={t}>{t}</option>)}
              </select>
              
              <div className="relative flex-grow md:flex-grow-0">
                <Icons.Search className="w-4 h-4 absolute left-2 top-2 text-gray-400" />
                <input type="text" placeholder="Wildcard Search..." className="pl-8 pr-2 py-1.5 border border-gray-300 rounded text-xs w-full focus:ring-2 focus:ring-blue-500 outline-none"
                  value={filters.search} onChange={e => setFilters({...filters, search: e.target.value})} />
              </div>
            </div>
          </div>

          {error && (
            <div className="bg-red-50 border-l-4 border-red-500 p-4 rounded shadow-sm">
              <div className="flex items-center">
                <div className="flex-shrink-0">
                  <svg className="h-5 w-5 text-red-400" viewBox="0 0 20 20" fill="currentColor">
                    <path fillRule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.78 7.5a.75.75 0 011.44 0v4.5a.75.75 0 01-1.44 0v-4.5zM10 15a1 1 0 100-2 1 1 0 000 2z" clipRule="evenodd" />
                  </svg>
                </div>
                <div className="ml-3">
                  <p className="text-sm text-red-700 font-medium">Error loading data: {error}</p>
                </div>
              </div>
            </div>
          )}

          {/* Summary Panel (4-Card Grid) */}
          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
            {/* Card 1: Blue */}
            <div className="bg-gradient-to-br from-blue-700 to-blue-900 text-white p-4 rounded-xl shadow-lg hover:-translate-y-1 transition-transform duration-200 border border-blue-600">
              <div className="text-[11px] font-bold uppercase tracking-widest mb-2 opacity-80 flex items-center justify-between">
                <span>200分發點 (Nodes)</span>
                <span className="bg-white/20 px-2 py-0.5 rounded-full text-[9px]">KPI</span>
              </div>
              <div className="bg-white/10 rounded-lg px-4 py-3 backdrop-blur-sm border border-white/10">
                <div className="text-3xl font-black">{formatShort(summary.nodes)}</div>
              </div>
            </div>

            {/* Card 2: Orange */}
            <div className="bg-gradient-to-br from-orange-500 to-orange-700 text-white p-4 rounded-xl shadow-lg hover:-translate-y-1 transition-transform duration-200 border border-orange-400">
              <div className="text-[11px] font-bold uppercase tracking-widest mb-2 opacity-80 flex items-center justify-between">
                <span>862+ICB (Bookings)</span>
                <span className="bg-white/20 px-2 py-0.5 rounded-full text-[9px]">KPI</span>
              </div>
              <div className="bg-white/10 rounded-lg px-4 py-3 backdrop-blur-sm border border-white/10">
                <div className="text-3xl font-black">{formatShort(summary.book)}</div>
              </div>
            </div>

            {/* Card 3: Green */}
            <div className="bg-gradient-to-br from-emerald-600 to-emerald-800 text-white p-4 rounded-xl shadow-lg hover:-translate-y-1 transition-transform duration-200 border border-emerald-500">
              <div className="text-[11px] font-bold uppercase tracking-widest mb-2 opacity-80 flex items-center justify-between">
                <span>High PEXO & Revenue</span>
                <span className="bg-white/20 px-2 py-0.5 rounded-full text-[9px]">KPI</span>
              </div>
              <div className="bg-white/10 rounded-lg px-4 py-3 backdrop-blur-sm border border-white/10 flex justify-between items-end">
                <div>
                  <div className="text-xs font-semibold opacity-80">PT QTY</div>
                  <div className="text-xl font-bold">{formatShort(summary.ptQty)}</div>
                </div>
                <div className="text-right">
                  <div className="text-xs font-semibold opacity-80">Revenue</div>
                  <div className="text-2xl font-black text-emerald-100">{formatShort(summary.rev, true)}</div>
                </div>
              </div>
            </div>

            {/* Card 4: Purple */}
            <div className="bg-gradient-to-br from-purple-700 to-purple-900 text-white p-4 rounded-xl shadow-lg hover:-translate-y-1 transition-transform duration-200 border border-purple-600">
              <div className="text-[11px] font-bold uppercase tracking-widest mb-2 opacity-80 flex items-center justify-between">
                <span>200% 紫燈 (MTD%)</span>
                <span className="bg-white/20 px-2 py-0.5 rounded-full text-[9px]">KPI</span>
              </div>
              <div className="bg-white/10 rounded-lg px-4 py-3 backdrop-blur-sm border border-white/10">
                <div className="text-3xl font-black">Active Target</div>
              </div>
            </div>
          </div>

          {/* Detailed Table Section */}
          <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden flex flex-col">
            <div className="flex justify-between items-center p-3 border-b border-gray-200 bg-gray-50">
              <h2 className="text-sm font-bold text-gray-700 flex items-center gap-2">
                <svg className="w-4 h-4 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 10h18M3 14h18m-9-4v8m-7 0h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
                </svg>
                Detailed Analytics
              </h2>
              <button onClick={handleExport} disabled={loading || sortedData.length === 0} className="flex items-center gap-1.5 bg-gray-800 hover:bg-black text-white text-[11px] font-bold px-3 py-1.5 rounded transition-colors disabled:opacity-50">
                <Icons.Download className="w-3.5 h-3.5" /> Export CSV
              </button>
            </div>

            <div className="overflow-x-auto max-h-[65vh] relative bg-white">
              {loading && !error ? (
                <div className="absolute inset-0 z-50 bg-white/80 backdrop-blur-sm flex items-center justify-center">
                  <div className="flex flex-col items-center gap-3">
                    <Icons.RefreshCw className="w-8 h-8 text-blue-600 animate-spin" />
                    <span className="text-sm font-bold text-gray-600 animate-pulse">Fetching & Mapping Data...</span>
                  </div>
                </div>
              ) : null}

              <table className="w-full text-left border-collapse whitespace-nowrap min-w-max">
                <thead className="sticky top-0 z-40 bg-gray-100 border-b-2 border-gray-300 shadow-sm">
                  {/* Super Headers */}
                  {headers.length > 0 && (
                    <tr>
                      <th colSpan="3" className="bg-gray-200 border-r border-white sticky left-0 z-30 sticky-shadow"></th>
                      <th colSpan="2" className="bg-blue-100 text-blue-800 text-[10px] font-bold px-2 py-1 text-center border-r border-white">Blue KPI Group</th>
                      <th colSpan="2" className="bg-orange-100 text-orange-800 text-[10px] font-bold px-2 py-1 text-center border-r border-white">Orange KPI Group</th>
                      <th colSpan="2" className="bg-emerald-100 text-emerald-800 text-[10px] font-bold px-2 py-1 text-center border-r border-white">Green KPI Group</th>
                      <th colSpan="100%" className="bg-purple-100 text-purple-800 text-[10px] font-bold px-2 py-1 text-center">Purple KPI Group</th>
                    </tr>
                  )}
                  
                  {/* Actual Column Headers */}
                  <tr>
                    {headers.map((header, idx) => {
                      const isSticky = idx < 3;
                      const isLastSticky = idx === 2;
                      const stickyClasses = isSticky ? `sticky bg-gray-100 z-30 border-r border-gray-200` : '';
                      const shadowClass = isLastSticky ? 'sticky-shadow' : '';
                      
                      // Calculate manual left positions for stickiness
                      let leftPos = '0';
                      if (idx === 1) leftPos = '80px';
                      if (idx === 2) leftPos = '160px';

                      return (
                        <th 
                          key={idx} 
                          className={`px-2 py-2.5 text-[10px] font-bold text-gray-600 uppercase tracking-wider cursor-pointer hover:bg-gray-200 transition-colors ${stickyClasses} ${shadowClass}`}
                          style={isSticky ? { left: leftPos, minWidth: '80px' } : {}}
                          onClick={() => handleSort(idx)}
                        >
                          <div className="flex items-center justify-between gap-2 whitespace-normal break-words w-full">
                            <span>{header}</span>
                            {sortConfig.key === idx && (
                              <span className="text-blue-600 font-black shrink-0">{sortConfig.direction === 'asc' ? '↑' : '↓'}</span>
                            )}
                          </div>
                        </th>
                      )
                    })}
                  </tr>
                </thead>
                <tbody className="divide-y divide-gray-100">
                  {sortedData.length === 0 && !loading && !error ? (
                    <tr><td colSpan="100%" className="text-center py-12 text-sm text-gray-500">No matching records found.</td></tr>
                  ) : sortedData.map((row, rowIdx) => (
                    <tr key={rowIdx} className="hover:bg-blue-50/50 transition-colors group">
                      {headers.map((_, colIdx) => {
                        const val = row[colIdx];
                        const isSticky = colIdx < 3;
                        const isLastSticky = colIdx === 2;
                        
                        // We use a white background for sticky columns so they don't become transparent over other rows
                        const stickyClasses = isSticky ? `sticky bg-white group-hover:bg-blue-50/50 z-20 border-r border-gray-100 transition-colors` : '';
                        const shadowClass = isLastSticky ? 'sticky-shadow' : '';
                        
                        let leftPos = '0';
                        if (colIdx === 1) leftPos = '80px';
                        if (colIdx === 2) leftPos = '160px';

                        // Advanced Conditional Formatting Engine
                        let cellClass = "px-2 py-2 text-[11px] text-gray-700";
                        if (!isSticky) {
                          const numVal = parseNumber(val);
                          const strVal = String(val);
                          
                          // Percentage formatting (Purple targets)
                          if (strVal.includes('%') && numVal >= 100) {
                            cellClass += " bg-purple-100/50 font-bold text-purple-900";
                          } else if (strVal.includes('%') && numVal < 50) {
                            cellClass += " text-red-600";
                          }
                          // High volume formatting (Green targets)
                          else if (numVal > 1000) {
                            cellClass += " text-emerald-700 font-semibold";
                          }
                          // Low volume formatting (Red warnings)
                          else if (numVal < 0) {
                            cellClass += " text-red-600 bg-red-50";
                          }
                        } else {
                          // Make the sticky hierarchy columns bolder
                          cellClass += " font-medium text-gray-900";
                        }

                        return (
                          <td 
                            key={colIdx} 
                            className={`${cellClass} ${stickyClasses} ${shadowClass} truncate max-w-[150px]`}
                            style={isSticky ? { left: leftPos } : {}}
                            title={val}
                          >
                            {val}
                          </td>
                        )
                      })}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            
            <div className="bg-gray-50 p-2 border-t border-gray-200 text-xs text-gray-500 flex justify-between items-center">
              <span>Showing {sortedData.length} records</span>
              <span>Use scrollbars to navigate the table. Header columns are frozen.</span>
            </div>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
