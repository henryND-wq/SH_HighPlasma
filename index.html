        const Download = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>;
        
        // Summary Card Icons
        const Share2 = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" x2="15.42" y1="13.51" y2="17.49"/><line x1="15.41" x2="8.59" y1="6.51" y2="10.49"/></svg>;
        const CalendarCheck = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/><path d="m9 16 2 2 4-4"/></svg>;
        const TrendingUp = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>;
        const Zap = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>;

        function parseCSV(text) {
            const result = [];
            const lines = text.split(/\r?\n/);
            for (let line of lines) {
                const row = [];
                let inQuotes = false;
                let val = "";
                for (let i = 0; i < line.length; i++) {
                    const char = line[i];
                    if (char === '"') inQuotes = !inQuotes;
                    else if (char === ',' && !inQuotes) { row.push(val.trim()); val = ""; }
                    else val += char;
                }
                row.push(val.trim());
                result.push(row);
            }
            return result;
        }

        const parseNumber = (val) => {
            if (!val || val === '-' || val === '#N/A' || val === 'no data atm' || val === '#DIV/0!') return 0;
            const clean = String(val).replace(/,/g, '').replace(/%/g, '').replace(/\$/g, '').replace(/¥/g, '');
            const num = parseFloat(clean);
            return isNaN(num) ? 0 : num;
        };

        const formatShortCurrency = (val) => {
            if (val === undefined || isNaN(val)) return '-';
            const num = Math.abs(val);
            if (num >= 1000000) return (val < 0 ? '-$' : '$') + (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (val < 0 ? '-$' : '$') + (num / 1000).toFixed(1) + 'K';
            return (val < 0 ? '-$' : '$') + num.toLocaleString();
        };

        const formatShortCurrency2Decimals = (val) => {
            if (val === undefined || isNaN(val)) return '-';
            const num = Math.abs(val);
            if (num >= 1000000) return (val < 0 ? '-$' : '$') + (num / 1000000).toFixed(2) + 'M';
            if (num >= 1000) return (val < 0 ? '-$' : '$') + (num / 1000).toFixed(2) + 'K';
            return (val < 0 ? '-$' : '$') + num.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        };

        const getConditionalFormat = (colName, val, targetRatio, ranges) => {
            const num = parseFloat(val);
            if (isNaN(num)) return { className: 'text-gray-800' };

            let className = 'text-gray-900 font-medium ';
            let style = {};

            if (colName === '分發點總數') {
                if (num > 200) className += 'bg-green-200';
                else if (num >= 150) className += 'bg-yellow-200';
                else if (num >= 80) className += 'bg-orange-200';
                else className += 'bg-red-200';
            }
            else if (colName === '3天增加') {
                if (num > 0) className += 'bg-green-200';
                else if (num < 0) className += 'bg-red-200';
            }
            else if (colName === '未來 ICB Booking' || colName === '昨天SHOW' || colName === '昨天SHOW (ICB)') {
                if (num > 25) className += 'bg-green-200';
                else if (num >= 15) className += 'bg-yellow-200';
                else className += 'bg-red-200';
            }
            else if (colName === '體驗療程開單(今天)' || colName === '今天 PT QTY' || colName === '套餐 (Package)開單(今天)' || colName === '今天 Full course') {
                if (num >= 3) className += 'bg-green-200';
                else if (num >= 1) className += 'bg-yellow-200';
                else className += 'bg-red-200';
            }
            else if (colName === 'MTD%') {
                if (targetRatio && num > (targetRatio * 100)) className += 'bg-purple-300 font-bold';
                else if (num >= 100) className += 'bg-green-200';
                else if (num >= 90) className += 'bg-yellow-200';
                else className += 'bg-red-200';
            }

            return { className, style };
        };

        function getDynamicIndex(headers, searchTerms, fallbackIndex) {
            for (let i = 0; i < headers.length; i++) {
                const h = (headers[i] || '').replace(/[\r\n]+/g, ' ').replace(/"/g, '').trim().toLowerCase();
                if (searchTerms.some(term => h === term.toLowerCase())) {
                    return i;
                }
            }
            for (let i = 0; i < headers.length; i++) {
                const h = (headers[i] || '').replace(/[\r\n]+/g, ' ').replace(/"/g, '').trim().toLowerCase();
                if (searchTerms.some(term => h.includes(term.toLowerCase()))) {
                    return i;
                }
            }
            return fallbackIndex;
        }

        const GOOGLE_SHEET_ID = '1mtORjZ4a5EyrlPJsiejhXuMZiyw5MStoXdxn5l1Jhno';

        function App() {
            const [data, setData] = useState([]);
            const [headers, setHeaders] = useState([]);
            const [colMap, setColMap] = useState(null); 
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);

            const [grandTotalRow, setGrandTotalRow] = useState(null);
            const [mtdTargetRatio, setMtdTargetRatio] = useState(null);

            const [searchTerm, setSearchTerm] = useState('');
            const [selectedBrand, setSelectedBrand] = useState('All');
            const [selectedCenter, setSelectedCenter] = useState('All');
            const [selectedTherapist, setSelectedTherapist] = useState('All');
            const [lastSyncTime, setLastSyncTime] = useState(null);
            
            const [sortConfig, setSortConfig] = useState({ key: null, direction: 'asc' });

            const fetchData = useCallback(async () => {
                try {
                    setLoading(true);
                    const sheetId = GOOGLE_SHEET_ID;
                    
                    // Specific to the "(WEB) real time (SH)" tab using sheet name
                    const urls = [
                        `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent('(WEB) real time (SH)')}`
                    ];

                    const [realTimeRes] = await Promise.all(
                        urls.map(url => fetch(url))
                    );

                    if (!realTimeRes.ok) throw new Error("Could not fetch the sheet. Please ensure it's set to 'Anyone with the link can view'.");
                    
                    const realTimeCsv = await realTimeRes.text();
                    const realTimeParsed = parseCSV(realTimeCsv);

                    // Find Grand Total row
                    const gtRow = realTimeParsed.find(row => row[2] === 'Grand Total');
                    if (gtRow) setGrandTotalRow(gtRow);

                    let targetRatio = null;
                    if (realTimeParsed.length > 2) {
                        const bj3 = parseNumber(realTimeParsed[2][61]);
                        const bm2 = parseNumber(realTimeParsed[1][64]);
                        if (bm2 > 0) {
                            targetRatio = (bj3 / bm2) * 1.5;
                        }
                    }
                    setMtdTargetRatio(targetRatio);

                    // --- 2. EXTRACT HEADER INDICES DYNAMICALLY ---
                    let headerRowIdx = 0;
                    for (let i = 0; i < Math.min(10, realTimeParsed.length); i++) {
                        if (realTimeParsed[i].some(cell => cell.toLowerCase().includes('brand') || cell.toLowerCase().includes('center'))) {
                            headerRowIdx = i;
                            break;
                        }
                    }

                    const extractedHeaders = realTimeParsed[headerRowIdx];
                    
                    // UPDATED SHANGHAI MAPPINGS
                    const mappedIndices = {
                        brand: getDynamicIndex(extractedHeaders, ['Brand'], 0),
                        center: getDynamicIndex(extractedHeaders, ['Center'], 2),
                        therapist: getDynamicIndex(extractedHeaders, ['Therapist'], 3),
                        
                        node: getDynamicIndex(extractedHeaders, ['Node總數'], 12), 
                        mauPercent: getDynamicIndex(extractedHeaders, ['MAU %', 'MAU%'], 13), 
                        node3Days: getDynamicIndex(extractedHeaders, ['3天增加'], 14), 
                        
                        futureICB: getDynamicIndex(extractedHeaders, ['未來 ICB Booking'], 11), 
                        yesterdayShow: getDynamicIndex(extractedHeaders, ['昨天SHOW'], 9), 
                        yesterdayShowICB: getDynamicIndex(extractedHeaders, ['昨天SHOW (ICB)', '昨天SHOW(ICB)'], 10), 
                        
                        // High Pexo
                        trialTodayMain: getDynamicIndex(extractedHeaders, ['體驗療程開單 (今天)', '體驗療程開單(今天)'], 15), // P
                        trialTodayBracket: getDynamicIndex(extractedHeaders, ['今天 PT QTY', '今天PT QTY'], 16), // Q
                        packageTodayMain: getDynamicIndex(extractedHeaders, ['套餐 (Package)開單(今天)', '套餐(Package)開單(今天)'], 17), // R
                        packageTodayBracket: getDynamicIndex(extractedHeaders, ['今天 Full course', '今天Full course'], 18), // S
                        penetrationRate: getDynamicIndex(extractedHeaders, ['滲透率%'], 19), // T
                        
                        // Purple Light
                        targetMonth: getDynamicIndex(extractedHeaders, ['本月目標$$'], 4), // E
                        totalSalesMonth: getDynamicIndex(extractedHeaders, ['本月總業績$$'], 5), // F
                        mtdPercent: getDynamicIndex(extractedHeaders, ['MTD%'], 6), // G
                        turnLightMissing: getDynamicIndex(extractedHeaders, ['轉燈尚欠$$'], 7), // H
                        todaySales: getDynamicIndex(extractedHeaders, ['今日開單 $$', '今日開單$$'], 8) // I
                    };
                    setColMap(mappedIndices);

                    const rawData = realTimeParsed.slice(headerRowIdx + 1, 300).filter(row => row.length > 5); 
                    
                    let currentBrand = 'Unknown';
                    let currentCenter = 'Unknown';
                    
                    const filledData = rawData.map(row => {
                        if (row[mappedIndices.brand] && row[mappedIndices.brand].trim() !== '') currentBrand = row[mappedIndices.brand];
                        else row[mappedIndices.brand] = currentBrand;
                        
                        if (row[mappedIndices.center] && row[mappedIndices.center].trim() !== '') currentCenter = row[mappedIndices.center];
                        else row[mappedIndices.center] = currentCenter;
                        
                        return row;
                    });

                    const finalHeaders = extractedHeaders.map((h, i) => h || `Col ${i + 1}`);

                    setHeaders(finalHeaders);
                    setData(filledData);
                    setLastSyncTime(new Date());
                    setError(null);

                } catch (err) {
                    setError(err.message);
                    setLastSyncTime(new Date());
                } finally {
                    setLoading(false);
                }
            }, []);

            useEffect(() => {
                fetchData();
            }, [fetchData]);

            // Constructing Active KPI Table Definitions Dynamically
            const activeKPIs = useMemo(() => {
                if (!colMap) return [];
                
                return [
                    // 200% Purple Light Group
                    { id: 'targetMonth', index: colMap.targetMonth, name: '本月目標$$', format: 'currency', headerClass: 'bg-purple-100 text-purple-900 border-t border-purple-200' },
                    { id: 'totalSalesMonth', index: colMap.totalSalesMonth, name: '本月總業績$$', format: 'currency', headerClass: 'bg-purple-100 text-purple-900 border-t border-purple-200' },
                    { id: 'mtdPercent', index: colMap.mtdPercent, name: 'MTD%', format: 'percent', headerClass: 'bg-purple-100 text-purple-900 border-t border-purple-200' },
                    { id: 'turnLightMissing', index: colMap.turnLightMissing, name: '轉燈尚欠$$', format: 'currency', headerClass: 'bg-purple-100 text-purple-900 border-t border-purple-200' },
                    { id: 'todaySales', index: colMap.todaySales, name: '今日開單 $$', format: 'currency', headerClass: 'bg-purple-100 text-purple-900 border-t border-purple-200' },

                    // 862+ICB Group
                    { id: 'futureICB', index: colMap.futureICB, name: '未來 ICB Booking', format: 'number', headerClass: 'bg-orange-100 text-orange-900 border-t border-orange-200' },
                    { id: 'yesterdayShow', index: colMap.yesterdayShow, name: '昨天SHOW', format: 'number', headerClass: 'bg-orange-100 text-orange-900 border-t border-orange-200' },
                    { id: 'yesterdayShowICB', index: colMap.yesterdayShowICB, name: '昨天SHOW (ICB)', format: 'number', headerClass: 'bg-orange-100 text-orange-900 border-t border-orange-200' },

                    // 200 Nodes Group
                    { id: 'node', index: colMap.node, name: '分發點總數', format: 'number', headerClass: 'bg-blue-100 text-blue-900 border-t border-blue-200' },
                    { id: 'mauPercent', index: colMap.mauPercent, name: 'MAU %', format: 'percent', headerClass: 'bg-blue-100 text-blue-900 border-t border-blue-200' },
                    { id: 'node3Days', index: colMap.node3Days, name: '3天增加', format: 'number', headerClass: 'bg-blue-100 text-blue-900 border-t border-blue-200' },
                    
                    // High Pexo PT/Head Group
                    { id: 'trialTodayMain', index: colMap.trialTodayMain, name: '體驗療程開單(今天)', format: 'number', headerClass: 'bg-green-100 text-green-900 border-t border-green-200' },
                    { id: 'trialTodayBracket', index: colMap.trialTodayBracket, name: '今天 PT QTY', format: 'number', headerClass: 'bg-green-100 text-green-900 border-t border-green-200' },
                    { id: 'packageTodayMain', index: colMap.packageTodayMain, name: '套餐 (Package)開單(今天)', format: 'number', headerClass: 'bg-green-100 text-green-900 border-t border-green-200' },
                    { id: 'packageTodayBracket', index: colMap.packageTodayBracket, name: '今天 Full course', format: 'number', headerClass: 'bg-green-100 text-green-900 border-t border-green-200' },
                    { id: 'penetrationRate', index: colMap.penetrationRate, name: '滲透率%', format: 'percent', headerClass: 'bg-green-100 text-green-900 border-t border-green-200' }
                ].map(kpi => ({
                    ...kpi,
                    displayName: (headers[kpi.index] && headers[kpi.index].trim() !== '') ? headers[kpi.index].replace(/[\r\n]+/g, ' ').replace(/"/g, '') : kpi.name
                }));
            }, [colMap, headers]);

            const brands = useMemo(() => {
                if (!colMap) return [];
                const validRows = data.filter(r => r[colMap.center] !== 'Grand Total');
                return ['All', ...new Set(validRows.map(r => r[colMap.brand]).filter(Boolean))];
            }, [data, colMap]);

            const centers = useMemo(() => {
                if (!colMap) return [];
                const validRows = data.filter(r => r[colMap.center] !== 'Grand Total');
                const brandFiltered = selectedBrand === 'All' ? validRows : validRows.filter(r => r[colMap.brand] === selectedBrand);
                return ['All', ...new Set(brandFiltered.map(r => r[colMap.center]).filter(Boolean))];
            }, [data, selectedBrand, colMap]);

            const therapists = useMemo(() => {
                if (!colMap) return [];
                const validRows = data.filter(r => r[colMap.center] !== 'Grand Total');
                let brandFiltered = selectedBrand === 'All' ? validRows : validRows.filter(r => r[colMap.brand] === selectedBrand);
                let centerFiltered = selectedCenter === 'All' ? brandFiltered : brandFiltered.filter(r => r[colMap.center] === selectedCenter);
                return ['All', ...new Set(centerFiltered.map(r => r[colMap.therapist]).filter(Boolean))];
            }, [data, selectedBrand, selectedCenter, colMap]);

            const processedData = useMemo(() => {
                if (!colMap || activeKPIs.length === 0) return [];
                let filtered = data.filter(row => row[colMap.center] !== 'Grand Total');

                if (selectedBrand !== 'All') filtered = filtered.filter(row => row[colMap.brand] === selectedBrand);
                if (selectedCenter !== 'All') filtered = filtered.filter(row => row[colMap.center] === selectedCenter);
                if (selectedTherapist !== 'All') filtered = filtered.filter(row => row[colMap.therapist] === selectedTherapist);
                if (searchTerm) filtered = filtered.filter(row => row.join(' ').toLowerCase().includes(searchTerm.toLowerCase()));

                let result = filtered.map((row, idx) => {
                    let mapped = {
                        id: `row-${idx}`, 
                        Brand: row[colMap.brand] || 'Unknown', 
                        Center: row[colMap.center] || 'Unknown',
                        Therapist: row[colMap.therapist] || '', 
                        raw: row
                    };
                    activeKPIs.forEach(kpi => {
                        mapped[kpi.id] = parseNumber(row[kpi.index]);
                    });
                    return mapped;
                });

                if (sortConfig.key) {
                    result.sort((a, b) => {
                        const valA = a[sortConfig.key];
                        const valB = b[sortConfig.key];
                        if (valA < valB) return sortConfig.direction === 'asc' ? -1 : 1;
                        if (valA > valB) return sortConfig.direction === 'asc' ? 1 : -1;
                        return 0;
                    });
                }
                return result;
            }, [data, searchTerm, selectedBrand, selectedCenter, selectedTherapist, sortConfig, activeKPIs, colMap]);

            const colRanges = useMemo(() => {
                const ranges = {};
                if (!activeKPIs) return ranges;
                // Currently no gradient mapped required columns left
                return ranges;
            }, [processedData, activeKPIs]);

            const summaryData = useMemo(() => {
                const isFiltered = selectedBrand !== 'All' || selectedCenter !== 'All' || selectedTherapist !== 'All' || searchTerm !== '';
                
                let sums = {
                    totalNodes: 0, nodeDelta: 0, mauPercent: 0,
                    futureICB: 0, yesterdayShow: 0, yesterdayShowICB: 0,
                    trialTodayMain: 0, trialTodayBracket: 0, packageTodayMain: 0, packageTodayBracket: 0,
                    penetrationRate: 0, targetMonth: 0, totalSalesMonth: 0, mtdPercent: 0, turnLightMissing: 0, todaySales: 0
                };

                if (!colMap) return sums;

                if (!isFiltered && grandTotalRow) {
                    sums.totalNodes = parseNumber(grandTotalRow[colMap.node]);
                    sums.nodeDelta = parseNumber(grandTotalRow[colMap.node3Days]);
                    sums.mauPercent = parseNumber(grandTotalRow[colMap.mauPercent]);
                    
                    sums.futureICB = parseNumber(grandTotalRow[colMap.futureICB]);
                    sums.yesterdayShow = parseNumber(grandTotalRow[colMap.yesterdayShow]);
                    sums.yesterdayShowICB = parseNumber(grandTotalRow[colMap.yesterdayShowICB]);
                    
                    sums.trialTodayMain = parseNumber(grandTotalRow[colMap.trialTodayMain]);        
                    sums.trialTodayBracket = parseNumber(grandTotalRow[colMap.trialTodayBracket]);   
                    sums.packageTodayMain = parseNumber(grandTotalRow[colMap.packageTodayMain]);
                    sums.packageTodayBracket = parseNumber(grandTotalRow[colMap.packageTodayBracket]); 
                    sums.penetrationRate = parseNumber(grandTotalRow[colMap.penetrationRate]);    
                    
                    sums.targetMonth = parseNumber(grandTotalRow[colMap.targetMonth]);
                    sums.totalSalesMonth = parseNumber(grandTotalRow[colMap.totalSalesMonth]);
                    sums.mtdPercent = parseNumber(grandTotalRow[colMap.mtdPercent]);    
                    sums.turnLightMissing = parseNumber(grandTotalRow[colMap.turnLightMissing]);
                    sums.todaySales = parseNumber(grandTotalRow[colMap.todaySales]);         
                } else {
                    processedData.forEach(item => {
                        sums.totalNodes += item.node;
                        sums.nodeDelta += item.node3Days;
                        sums.mauPercent += item.mauPercent;
                        
                        sums.futureICB += item.futureICB;
                        sums.yesterdayShow += item.yesterdayShow; 
                        sums.yesterdayShowICB += item.yesterdayShowICB;
                        
                        sums.trialTodayMain += item.trialTodayMain;
                        sums.trialTodayBracket += item.trialTodayBracket;
                        
                        sums.packageTodayMain += item.packageTodayMain;
                        sums.packageTodayBracket += item.packageTodayBracket; 
                        
                        sums.penetrationRate += item.penetrationRate;

                                            {activeKPIs.map(kpi => {
                                                const condFormat = getConditionalFormat(kpi.name, row[kpi.id], mtdTargetRatio, colRanges);
                                                return (
                                                    <td key={kpi.id} 
                                                        className={`px-1.5 py-1.5 text-center font-bold text-[11px] border-r border-gray-50/50 ${condFormat.className}`}
                                                        style={condFormat.style}
                                                    >
                                                        {formatDisplayValue(row[kpi.id], kpi.format)}
                                                    </td>
                                                );
                                            })}
                                        </tr>
                                    ))
                                ) : (
                                    <tr>
                                        <td colSpan={100} className="px-6 py-12 text-center text-gray-500 font-medium bg-gray-50 text-xs">
                                            找不到符合篩選條件的資料。
                                        </td>
                                    </tr>
                                )}
                            </tbody>
                        </table>
                    </div>
                    <div className="p-3 border-t border-gray-200 bg-gray-50 text-[11px] text-gray-500 text-right font-medium">
                        顯示 {processedData.length} 筆資料。
                    </div>
                </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
